<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>월간 운동 트래커</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1-fr); gap: 8px; }
        .day-cell { min-height: 100px; transition: all 0.2s; }
        .day-cell:hover { transform: translateY(-2px); box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .active-day { background-color: #dcfce7; border: 1px solid #22c55e; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <!-- 헤더 섹션 -->
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <div>
                <h1 id="currentMonthDisplay" class="text-3xl font-bold text-slate-800">2024년 5월</h1>
                <p class="text-slate-500">당신의 꾸준한 운동을 응원합니다!</p>
            </div>
            <div class="flex gap-2">
                <button onclick="changeMonth(-1)" class="p-2 bg-white border rounded-lg hover:bg-slate-50">이전 달</button>
                <button onclick="changeMonth(1)" class="p-2 bg-white border rounded-lg hover:bg-slate-50">다음 달</button>
                <button onclick="today()" class="p-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">오늘</button>
            </div>
        </header>

        <!-- 통계 요약 -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <p class="text-sm text-slate-500 mb-1">이번 달 운동 횟수</p>
                <h3 id="monthlyCount" class="text-2xl font-bold text-blue-600">0회</h3>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <p class="text-sm text-slate-500 mb-1">가장 많이 한 운동</p>
                <h3 id="topExercise" class="text-2xl font-bold text-green-600">-</h3>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <p class="text-sm text-slate-500 mb-1">달성률</p>
                <h3 id="achievementRate" class="text-2xl font-bold text-orange-500">0%</h3>
            </div>
        </div>

        <!-- 캘린더 본체 -->
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
            <div class="grid grid-cols-7 mb-4 text-center font-semibold text-slate-400">
                <div>일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div>토</div>
            </div>
            <div id="calendarGrid" class="grid grid-cols-7 gap-2 md:gap-4">
                <!-- 자바스크립트로 날짜가 생성됩니다 -->
            </div>
        </div>
    </div>

    <!-- 운동 기록 모달 -->
    <div id="modal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white w-full max-w-md rounded-2xl p-6 shadow-xl">
            <h2 id="modalDate" class="text-xl font-bold mb-4">운동 기록하기</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">운동 종류</label>
                    <select id="exerciseType" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                        <option value="러닝">🏃 러닝</option>
                        <option value="헬스">🏋️ 헬스</option>
                        <option value="요가">🧘 요가/필라테스</option>
                        <option value="수영">🏊 수영</option>
                        <option value="싸이클">🚴 싸이클</option>
                        <option value="기타">✨ 기타</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">운동 시간 (분)</label>
                    <input type="number" id="duration" placeholder="예: 60" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div class="flex gap-2 pt-2">
                    <button onclick="saveRecord()" class="flex-1 bg-blue-600 text-white py-2 rounded-lg font-bold hover:bg-blue-700">저장</button>
                    <button onclick="closeModal()" class="flex-1 bg-slate-100 text-slate-600 py-2 rounded-lg font-bold hover:bg-slate-200">취소</button>
                </div>
                <button id="deleteBtn" onclick="deleteRecord()" class="w-full text-red-500 text-sm hover:underline mt-2 hidden">기록 삭제하기</button>
            </div>
        </div>
    </div>

    <script>
        let currentDate = new Date();
        let workouts = JSON.parse(localStorage.getItem('myWorkouts')) || {};
        let selectedDateKey = '';

        function init() {
            renderCalendar();
            updateStats();
        }

        function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            const display = document.getElementById('currentMonthDisplay');
            grid.innerHTML = '';

            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            display.innerText = `${year}년 ${month + 1}월`;

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            // 공백 생성
            for (let i = 0; i < firstDay; i++) {
                grid.innerHTML += `<div class="p-2"></div>`;
            }

            // 날짜 생성
            for (let d = 1; d <= daysInMonth; d++) {
                const dateKey = `${year}-${month + 1}-${d}`;
                const workout = workouts[dateKey];
                const isToday = new Date().toDateString() === new Date(year, month, d).toDateString();
                
                const cell = document.createElement('div');
                cell.className = `day-cell p-2 border rounded-xl cursor-pointer flex flex-col items-center justify-center gap-1 ${workout ? 'active-day' : 'bg-white'} ${isToday ? 'border-2 border-blue-400' : 'border-slate-100'}`;
                cell.onclick = () => openModal(dateKey);
                
                cell.innerHTML = `
                    <span class="text-sm ${isToday ? 'font-bold text-blue-600' : 'text-slate-600'}">${d}</span>
                    ${workout ? `<span class="text-xs font-bold text-green-700">${workout.type}</span>` : ''}
                    ${workout ? `<span class="text-[10px] text-green-600">${workout.duration}분</span>` : ''}
                `;
                grid.appendChild(cell);
            }
        }

        function openModal(dateKey) {
            selectedDateKey = dateKey;
            const modal = document.getElementById('modal');
            const deleteBtn = document.getElementById('deleteBtn');
            const [y, m, d] = dateKey.split('-');
            
            document.getElementById('modalDate').innerText = `${y}년 ${m}월 ${d}일 운동 기록`;
            
            if (workouts[dateKey]) {
                document.getElementById('exerciseType').value = workouts[dateKey].type;
                document.getElementById('duration').value = workouts[dateKey].duration;
                deleteBtn.classList.remove('hidden');
            } else {
                document.getElementById('exerciseType').value = '러닝';
                document.getElementById('duration').value = '';
                deleteBtn.classList.add('hidden');
            }
            
            modal.classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
        }

        function saveRecord() {
            const type = document.getElementById('exerciseType').value;
            const duration = document.getElementById('duration').value;

            if (!duration) {
                alert('시간을 입력해주세요!');
                return;
            }

            workouts[selectedDateKey] = { type, duration };
            localStorage.setItem('myWorkouts', JSON.stringify(workouts));
            
            closeModal();
            renderCalendar();
            updateStats();
        }

        function deleteRecord() {
            delete workouts[selectedDateKey];
            localStorage.setItem('myWorkouts', JSON.stringify(workouts));
            closeModal();
            renderCalendar();
            updateStats();
        }

        function updateStats() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth() + 1;
            const daysInMonth = new Date(year, month, 0).getDate();
            
            let count = 0;
            let typeCounts = {};
            
            Object.keys(workouts).forEach(key => {
                const [y, m] = key.split('-');
                if (parseInt(y) === year && parseInt(m) === month) {
                    count++;
                    const type = workouts[key].type;
                    typeCounts[type] = (typeCounts[type] || 0) + 1;
                }
            });

            document.getElementById('monthlyCount').innerText = `${count}회`;
            
            let maxType = '-';
            let maxVal = 0;
            Object.keys(typeCounts).forEach(t => {
                if (typeCounts[t] > maxVal) {
                    maxVal = typeCounts[t];
                    maxType = t;
                }
            });
            document.getElementById('topExercise').innerText = maxType;

            const rate = Math.round((count / daysInMonth) * 100);
            document.getElementById('achievementRate').innerText = `${rate}%`;
        }

        function changeMonth(offset) {
            currentDate.setMonth(currentDate.getMonth() + offset);
            renderCalendar();
            updateStats();
        }

        function today() {
            currentDate = new Date();
            renderCalendar();
            updateStats();
        }

        init();
    </script>
</body>
</html>
